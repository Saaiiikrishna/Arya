name: Deploy Complete Application to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  deploy-backend-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure Container Apps Extension
        run: az extension add --name containerapp --upgrade

      - name: Run Prisma Migrations
        run: |
          cd backend
          npm ci
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed Database (idempotent upserts)
        run: |
          cd backend
          npx cross-env TS_NODE_PROJECT=tsconfig.seed.json npx ts-node -r tsconfig-paths/register prisma/seed.ts || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy Backend (NestJS)
        run: |
          az containerapp up \
            --name arya-backend-api \
            --resource-group arya-prod-rg \
            --location centralindia \
            --source ./backend \
            --ingress external \
            --target-port 3001 \
            --env-vars \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "PRISMA_DATASOURCE_URL=${{ secrets.DATABASE_URL }}" \
              "REDIS_HOST=arya-prod-redis-cache.redis.cache.windows.net" \
              "REDIS_PORT=6380" \
              "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" \
              "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              "JWT_EXPIRATION=15m" \
              "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" \
              "JWT_REFRESH_EXPIRATION=7d" \
              "AWS_REGION=ap-south-2" \
              "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
              "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              "AWS_SES_FROM_EMAIL=no-reply@aryavartham.com" \
              "AWS_SES_FROM_NAME=Aryavartham" \
              "AWS_S3_BUCKET=arya-documents" \
              "NODE_ENV=production" \
              "PORT=3001" \
              "FRONTEND_URL=https://aryavartham.com" \
              "BATCH_CAPACITY=1000" \
              "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" \
              "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" \
              "RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" \
              "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"

      - name: Get Backend URL
        id: get-backend-url
        run: |
          BACKEND_FQDN=$(az containerapp show --name arya-backend-api --resource-group arya-prod-rg --query properties.configuration.ingress.fqdn -o tsv)
          echo "backend_url=https://$BACKEND_FQDN" >> $GITHUB_ENV

      - name: Deploy Frontend (NextJS)
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ env.backend_url }}/api" > ./frontend/.env.production
          echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> ./frontend/.env.production
          az containerapp up \
            --name arya-frontend-web \
            --resource-group arya-prod-rg \
            --location centralindia \
            --source ./frontend \
            --ingress external \
            --target-port 3000 \
            --env-vars "NEXT_PUBLIC_API_URL=${{ env.backend_url }}/api"

      - name: Configure Scaling (min 1 replica to avoid cold starts)
        run: |
          az containerapp update --name arya-backend-api --resource-group arya-prod-rg --min-replicas 1 --max-replicas 50
          az containerapp update --name arya-frontend-web --resource-group arya-prod-rg --min-replicas 1 --max-replicas 50

      - name: Deactivate old revisions (keep only latest active)
        run: |
          # Deactivate all but the latest revision for backend
          LATEST_BACKEND=$(az containerapp show --name arya-backend-api --resource-group arya-prod-rg --query properties.latestRevisionName -o tsv)
          for rev in $(az containerapp revision list --name arya-backend-api --resource-group arya-prod-rg --query "[?name!='$LATEST_BACKEND'].name" -o tsv); do
            az containerapp revision deactivate --name arya-backend-api --resource-group arya-prod-rg --revision "$rev" || true
          done
          # Deactivate all but the latest revision for frontend
          LATEST_FRONTEND=$(az containerapp show --name arya-frontend-web --resource-group arya-prod-rg --query properties.latestRevisionName -o tsv)
          for rev in $(az containerapp revision list --name arya-frontend-web --resource-group arya-prod-rg --query "[?name!='$LATEST_FRONTEND'].name" -o tsv); do
            az containerapp revision deactivate --name arya-frontend-web --resource-group arya-prod-rg --revision "$rev" || true
          done

      - name: Configure Health Probes
        run: |
          az containerapp update --name arya-frontend-web --resource-group arya-prod-rg \
            --set-env-vars "HOSTNAME=0.0.0.0"
